name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run `mcp-server-viznoir`
        2. Call the `render` tool with ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: dropdown
    id: python-version
    attributes:
      label: Python Version
      options:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      options:
        - Claude Code
        - Cursor
        - Gemini CLI
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant logs or error output
      render: shell
