services:
  viznoir:
    build: .
    image: viznoir:latest
    volumes:
      - ${VIZNOIR_DATA_DIR:-./data}:/data:ro
      - ${VIZNOIR_OUTPUT_DIR:-./output}:/output
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - VIZNOIR_RENDER_BACKEND=gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Uncomment for HTTP transport:
    # ports:
    #   - "8000:8000"
    # command: ["mcp-server-viznoir", "--transport", "streamable-http", "--port", "8000"]

  # CPU-only variant — no GPU required (OSMesa software rendering)
  viznoir-cpu:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: viznoir-cpu:latest
    volumes:
      - ${VIZNOIR_DATA_DIR:-./data}:/data:ro
      - ${VIZNOIR_OUTPUT_DIR:-./output}:/output
    environment:
      - VIZNOIR_RENDER_BACKEND=cpu
      - VIZNOIR_VTK_BACKEND=osmesa
