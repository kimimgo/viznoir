name: viznoir
description: Headless CAE post-processing MCP server for AI coding assistants. Visualize CFD/FEA simulation results through 18 tools — render, slice, contour, clip, streamlines, cinematic, compare, batch, probe, preview_3d, and more.
vendor: kimimgo
sourceUrl: https://github.com/kimimgo/viznoir
homepage: https://kimimgo.github.io/viznoir
license: MIT
tags:
  - vtk
  - cfd
  - cae
  - visualization
  - simulation
  - post-processing
  - headless-rendering
  - engineering
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      VIZNOIR_DATA_DIR:
        type: string
        description: Restrict file access to this directory (security sandbox)
      VIZNOIR_OUTPUT_DIR:
        type: string
        default: /output
        description: Output directory for rendered images
      VIZNOIR_RENDER_BACKEND:
        type: string
        enum: [gpu, cpu, auto]
        default: gpu
        description: Rendering backend (gpu=EGL, cpu=OSMesa)
    required: []
  commandFunction: |-
    (config) => ({
      command: 'mcp-server-viznoir',
      env: {
        ...(config.VIZNOIR_DATA_DIR && { VIZNOIR_DATA_DIR: config.VIZNOIR_DATA_DIR }),
        ...(config.VIZNOIR_OUTPUT_DIR && { VIZNOIR_OUTPUT_DIR: config.VIZNOIR_OUTPUT_DIR }),
        ...(config.VIZNOIR_RENDER_BACKEND && { VIZNOIR_RENDER_BACKEND: config.VIZNOIR_RENDER_BACKEND }),
      }
    })
